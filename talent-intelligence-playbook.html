 brand stack up where we actually need to hire?"],z=[{t:"Directional, not exact",d:"It shows shape and scale - strong for comparison and trend, not a precise census of every individual."},{t:"A large sample, not everything",d:"Coverage is deep for digital, professional, and engineering roles; thinner for some regions, languages, and frontline work."},{t:"It lags reality a little",d:"Postings and profiles update fast but not instantly. Read momentum, and corroborate big calls across sources."},{t:"It still needs a human",d:"Data surfaces the what; a person supplies the why and the so-what. It informs judgment - it does not replace it."}],A=[{abbr:"HRA",name:"HR / People Analytics",lens:"Internal · backward-looking",desc:'Measures the workforce you already have — engagement, attrition, performance, headcount. Structured, governed data answering "what happened to our people?"',accent:"#8B8D92"},{abbr:"WA",name:"Workforce Analytics / Planning",lens:"Internal · forward-looking",desc:"Models the workforce you'll need — capacity, gaps, scenarios. Strategic Workforce Planning (SWP) is its long-horizon, strategic form and TI's most natural partner.",accent:"#0A5F58"},{abbr:"SI",name:"Sourcing Intelligence",lens:"External · tactical",desc:"Finds and maps named individuals for live roles — talent mapping, name generation, pipeline research. A force-multiplier for recruiting, close to the requisition.",accent:"#16A89B"},{abbr:"TI",name:"Talent Intelligence",lens:"Internal + external · strategic",desc:'Synthesizes all of the above plus competitive and market intelligence into advice for leaders. The consulting layer that answers "so what should we do?"',accent:"#0C7C72"}],R=[{to:"Talent Acquisition",items:["Competitor hiring & attrition signals","Employer-brand and offer benchmarks","Skills availability & talent mobility","Hard-to-fill role early warnings"]},{to:"Strategy & Exec",items:["Location & market-entry feasibility","Macro skills movement & risk profiles","Future talent ash-ups.",career:"HRBPs, business-unit leaders, workforce planners."}},{level:4,name:"Strategic / Embedded Advisory",horizon:"18–36 months",tagline:'"What does the talent map allow us to do?"',dims:{fn:"Scenario modelling, build-buy-borrow, SWP, M&A and location strategy.",work:"What futures are open to us, and what's the talent cost of each?",data:"Decision-grade data, proficiency models, predictive scenarios.",ops:"Embedded consultants, QBRs, a knowledge base, a comms strategy.",career:"Functional VPs, CHRO, CFO, business-line P&L owners."}},{level:5,name:"Trusted Adviser / Centre of Excellence",horizon:"36 months+",tagline:'"Get TI in the room before we decide."',dims:{fn:"A standalone TI Centre of Excellence shaping enterprise strategy.",work:"Where should the business place its next big talent bet?",data:"Unified architecture across internal systems + external market.",ops:"Self-service for routine asks; senior advisers 1:1 with leaders.",career:"The C-suite and the board."}}],L=[{k:"Business unit",v:"Account managers aligned to each business unit (e.g. pharma, chemicals). Best when the org is run by BU P&Ls."},{k:"Market / region",v:"Analysts own a geography (APAC, EMEA) and are the deep local labor-market experts. Best for region-led orgs."},{k:"Functional",v:"Aligned to job families (software, hardware, data science). Strong fit for engineering-led companies."},{k:"Product",v:"Aligned to product lines or platforms. Useful where products map cleanly to distinct talent markets."},{k:"Hybrid / pan-team",v:"Account managers plus pan-team specialists (competitor, DEI, skills intel) running across all accounts."}],M=[{name:"Centralized",accent:"#0C7C72",pros:["Holistic prioritization across the whole company","Tight cohesion, shared vision and standards","Economies of scale; less duplicated work","Easier knowledge-sharing and career paths"],cons:["More layers and bureaucracy","Slower decisions; further from the customer","Output can feel generic, not BU-specific"]},{name:"Decentralized",accent:"#BE6E27",pros:["Embedded in the business; fast and customized","No ramp-up — analysts know the mission","Clear line of sight to local impact"],cons:["Fewer career paths at small scale","Duplicated effort, weaker tooling economics","Inconsistent output between groups"]},{name:"Centralized-ringfenced",accent:"#16A89B",best:!0,pros:["Central headcount, reporting, tooling & career paths","Ringfenced and aligned to a BU / market / function","Speed and local relationships of embedded teams","The pragmatic best-of-both default"],cons:["Needs disciplined demand management","Requires clear rules on who the ringfence serves"]}],O=[{home:"Talent Acquisition",note:"The most common starting home — gives route-to-customer. Best run as a ringfenced TI subteam with its own tools, metrics, and goals so it isn't pulled back into pure sourcing."},{home:"Strategic Workforce Planning",note:"A natural partner: same strategic horizon, same senior customer. Enriching SWP with external labor data is one of the highest-value pairings."},{home:"Centralized Intelligence",note:"Sits beside competitive, market, and real-estate intelligence on a shared data strategy. Powerful but still rare in practice."},{home:"TI Centre of Excellence",note:'The mature endpoint — TI carves out as its own CoE. "Fat" CoE owns strategy + delivery; "thin" CoE owns strategy and embeds delivery in the business.'}],D=["Strategic Workforce Planning","Finance","Real Estate / Location Intelligence","M&A and Corporate Development","Competitive Intelligence","Marketing Intelligence","Compensation & Benefits","Org Design & Effectiveness","DEI","Learning & Development"],F=[{role:"TI Consultant / Account Manager",focus:"Owns stakeholder relationships, scopes work, turns research into advice. The trusted face of the function.",core:"Consulting · business acumen · storytelling"},{role:"TI Analyst",focus:"Scopes and delivers insight projects; runs the research and connects data sources. The pipeline for future consultants.",core:"Research · critical thinking · writing"},{role:"TI Futurist / Economist",focus:"Looks 18+ months out at labor-market headwinds and shifts, then recommends strategy. Often an economist by training.",core:"Macro/micro econ · scenario thinking"},{role:"Data Scientist",focus:"Drives data-first decisions and predictive work — but only pays off with access to clean, raw data, not pre-aggregated feeds.",core:"Stats · ML · modelling"},{role:"Comms / Knowledge Manager",focus:"Pushes intelligence in front of the right people via newsletters, QBRs, infographics. The single most under-rated role.",core:"Comms · KM systems · curation"},{role:"Candidate Perception Scientist",focus:"Runs qual + quant research on how the market and candidates perceive the employer brand across job families and geos.",core:"Survey design · qual research"},{role:"Product / Technical PM",focus:"Needed once you move toward a self-service product suite — owns roadmap (PM) or build feasibility and engineering (TPM).",core:"Product · program management"}],B=["Sourcing & talent mapping","Stakeholder management","Location strategy","Competitor intelligence","DEI intelligence","Problem solving"],W=["Data visualization","Predictive analytics","Data analysis","Strategic consulting","Data engineering","Storytelling with data"],H=[{stat:"1 : ≤50",label:"Analysts to stakeholders",note:"~70% of teams in the TIC benchmark run roughly one team member per 50 customers — but be honest about who the true customer is."},{stat:"1 : 1–2",label:"Senior adviser to leader",note:"For high-level decision-makers, a senior TI trusted adviser may pair 1:1 or 1:2 to act as their strategic talent partner."},{stat:"2–6",label:"People in a starting central team",note:"A small central team that owns the capability, vendor relationship, and taxonomy governance, then scales by enablement."}],$=[{cat:"Labor Market Intelligence",role:"Maps external supply, demand, comp, and skills by geography. The backbone of location and SWP work.",examples:"Lightcast · Draup · TalentNeuron · Revelio · SkyHive"},{cat:"TI / AI search platforms",role:"Match people to roles across internal + external sources; surface skills adjacencies and career paths.",examples:"Eightfold · SeekOut · hireEZ"},{cat:"CRM",role:"Track and nurture candidate relationships; increasingly AI-enriched.",examples:"Beamery · Phenom"},{cat:"Internal Talent Marketplace",role:"Understand internal people and roles by skill to unlock mobility, gigs, and reskilling paths.",examples:"Gloat · Fuel50"},{cat:"Source systems",role:"The records TI reads from: who applied, who works here, what skills exist.",examples:"ATS · HRIS · LMS · job boards"}],U=[{opt:"Buy",when:"You need breadth, speed, and benchmarked market data now. Start here for most location, comp, and competitor work.",watch:"Pre-aggregated platform data limits custom modelling and data science."},{opt:"Build",when:"You have clean raw data, a data-science capability, and questions no vendor answers off the shelf.",watch:"Expensive and slow; needs data engineering most teams lack early on."},{opt:"Blend",when:"The realistic default: vendor data for market breadth, internal build for proprietary internal questions and integration.",watch:"Requires clear ownership of where the seam between bought and built data sits."}],q=[{step:"Data cataloging",desc:"Inventory every source and the exact fields you need: ATS/CRM, HRIS, specialist HR systems, job boards, social. Data is the food for any AI system."},{step:"Data assessment audit",desc:"Check reality, not theory. Resumes are often missing, off-platform, or inconsistent. Audit quality before you wire anything together."},{step:"Integration",desc:"Most modern systems have decent APIs. Vendor integration specialists build the links so data becomes usable in one place."},{step:"Governance",desc:"Set taxonomy ownership, access controls, refresh cadence, and audit trails from day one — not after the first compliance question."}],V=[{cap:"Skills architecture & job decomposition",good:"Continuous ingestion of external labor data; roles broken to the task level so you can see where AI, automation, or redeployment apply."},{cap:"Workforce planning & scenario modelling",good:"Internal + external data in one view; scenarios across attrition, automation, location, M&A, and product strategy. Workflows for HRBPs, Finance, and analytics."},{cap:"Decision-grade data quality",good:"Normalized, deduplicated, taxonomy-mapped, task-decomposed, contextualized, continuously refreshed — with lineage and audit trails. A raw job-postings feed is not LMI."},{cap:"Integration & APIs",good:"Connects to your ATS, HRIS, and LMS rather than becoming another data island."},{cap:"Governance & compliance",good:"Role-based access, bias detection, and SOC 2 / GDPR / ISO 27001 alignment with full audit trails."}],Q=[{tier:"Raw feed",note:"Job postings, scraped profiles. Cheap, noisy, not decision-ready."},{tier:"Normalized",note:"Deduplicated and mapped to a taxonomy. Usable for trends."},{tier:"Decision-grade",note:"Task-decomposed, contextualized, governed, refreshed, audit-trailed."}],G=[{n:"1",stage:"Needs capture",desc:"A structured intake — form or meeting — that pins down the real question, the measurable success metrics, scope, stakeholders, timeline, and confidentiality.",out:"Completed intake form"},{n:"2",stage:"Prioritize",desc:"Score the request on urgency and importance against your team's goals before you commit capacity. Not everything escalated is actually urgent.",out:"Priority score & queue position"},{n:"3",stage:"Plan & sign-off",desc:"A one-page plan: problem statement, deliverables, SMART objectives, in/out scope, risks, dependencies. Never start without sign-off.",out:"Signed-off project plan"},{n:"4",stage:"Research",desc:"The core analytical work — blending internal and external data, working backward from the delivery date.",out:"Analysis & draft findings"},{n:"5",stage:"Deliver",desc:"Land the insight in the format the customer can act on — and match the format to how much control of the narrative you need.",out:"Decision-ready deliverable"},{n:"6",stage:"Wash-up",desc:"An internal, no-blame review: did we hit the intake goal, what went well, what we'd do differently. The most-skipped, most-valuable internal step.",out:"Lessons-learned log"},{n:"7",stage:"Stakeholder feedback",desc:"The single most valuable external step. Capture NPS / CSAT / CES — ideally in person, where you also business-develop the next project.",out:"Feedback + next pipeline"}],Y=["Key issue / problem statement","Measurable impact & success metrics","Key data points needed for the decision","In-scope and out-of-scope parameters","Primary stakeholder & sponsor (and their grade)","Timescale for delivery","Confidentiality level","Project type (location, skills, competitor, M&A, listening…)","Headcount impacted & average salary","Number of locations / job families in scope"],K=[{score:3,label:"Do first",desc:"High importance + high urgency. Visible, high-impact work that serves both the function and the customer.",accent:"#0C7C72"},{score:2,label:"Schedule",desc:"High importance, low urgency. Advances the function (customer expansion, sponsor level) without a pressing deadline.",accent:"#16A89B"},{score:1,label:"Delegate",desc:"Low importance, high urgency. Ad-hoc value-add for a stakeholder — a way to earn trust early.",accent:"#BE6E27"},{score:0,label:"Don't do",desc:"Low importance, low urgency. Decline or park it; protect capacity for work that matters.",accent:"#8B8D92"}],X=["All","Strategic","Acquisition","Competitive","Always-on"],Z=[{name:"Location & site selection",cat:"Strategic",desc:"Where to place or grow an engineering hub, weighed on talent depth, cost, competitor density, and risk — before committing real estate."},{name:"Strategic workforce planning",cat:"Strategic",desc:"Model the skills and headcount a business line needs 1–3 years out, and the build-buy-borrow path to get there."},{name:"Skills architecture & gaps",cat:"Strategic",desc:"Map current vs. required skills, flag emerging and declining ones, and prioritize the gaps worth closing."},{name:"M&A talent due diligence",cat:"Strategic",desc:"Assess a target's talent depth, key-person risk, retention exposure, and org structure before and after a deal."},{name:"Reskilling & internal mobility",cat:"Strategic",desc:"Find adjacent roles and viable career paths so you can build internally instead of always buying externally."},{name:"Talent mapping",cat:"Acquisition",desc:"Map the named population for a set of roles — who and where they are, by skill, company, and university."},{name:"Hard-to-fill diagnostics",cat:"Acquisition",desc:"Explain why a role won't close — supply, comp, location, or spec — and what to change to unblock it."},{name:"Employer-brand & candidate listening",cat:"Acquisition",desc:"Measure how the market and candidates perceive you, by job family and geography, and where perception costs you hires."},{name:"Diversity sourcing strategy",cat:"Acquisition",desc:"Quantify representation in the available talent pool and design sourcing that widens it."},{name:"Competitor org mapping",cat:"Competitive",desc:"Reconstruct a rival's org structure, spans, and key leaders to understand how they build and where they're exposed."},{name:"Talent flow & poaching analysis",cat:"Competitive",desc:"Track who's hiring from and losing to whom — early warning on attrition and acquisition targets."},{name:"Competitive battlecards",cat:"Competitive",desc:"Arm recruiters and HRBPs with comp, growth, and talent-flow data to win candidates and shape retention."},{name:"Compensation benchmarking",cat:"Always-on",desc:"Price roles by skill and geography so offers land and you don't overpay in saturated hubs."},{name:"Market & skills trend monitoring",cat:"Always-on",desc:"A standing read on emerging skills, demand shifts, and salary movement in your core talent markets."},{name:"Talent-market newsletter / QBR",cat:"Always-on",desc:"Recurring intelligence pushed to leaders so the function stays visible between projects."}],J=[{phase:"New",desc:"Just appearing; few people have them.",play:"Watch. Pilot small bets; don't over-hire yet.",accent:"#3FD9C8"},{phase:"Emerging",desc:"Demand rising fast, supply scarce.",play:"Buy selectively and start building internally.",accent:"#16A89B"},{phase:"Growing",desc:"Adoption accelerating across the market.",play:"Build development plans; buy to fill hard gaps.",accent:"#0C7C72"},{phase:"Core",desc:"Established and widely held.",play:"Develop internally; reskill toward emerging skills.",accent:"#BE6E27"},{phase:"Declining",desc:"Being automated or designed away.",play:"Reskill these workers toward growing/emerging skills.",accent:"#8B8D92"}],ee=[{mode:"Build",q:"Develop the skill internally",best:"Core/declining-skill workers with adjacency to the target; cheaper, faster, and better for retention than the HRIS suggests.",metric:"Time-to-skill · reskilling propensity"},{mode:"Buy",q:"Hire it externally",best:"Hard-to-close gaps with no internal adjacency, or net-new capability you need at speed.",metric:"Time-to-fill · talent availability · cost"},{mode:"Borrow",q:"Contract or partner",best:"Spiky or uncertain demand where you don't want permanent headcount.",metric:"Speed · flexibility · unit cost"},{mode:"Bot",q:"Automate the work",best:"Repeatable, rules-based tasks surfaced by task-level role decomposition.",metric:"Automatable task share"}],et=["1 in 2 companies take 2+ years to build a skills taxonomy.","Outdated info: libraries built once and never maintained drift from reality.","Conflicting taxonomies: each department invents its own meaning of a skill.","Low employee participation: people won't hand-maintain their own profiles.","No ownership: built by HR with no clear owner, so they stall."],en=[{pct:"67%",note:"start from their existing skills and taxonomy"},{pct:"18%",note:"start from scratch"},{pct:"14%",note:"adopt a vendor's taxonomy"}],er=["Confidential to project team","Confidential to Talent Intelligence","Confidential to leadership","Restricted to customer group (e.g. TA)","Internal access","Open / unrestricted"],ea=[{t:"Respect privacy",d:"Work with aggregated and anonymized data; never build covert profiles of individuals."},{t:"Design against bias",d:"Run fairness checks and keep a human in the loop, especially on anything touching individuals or hiring."},{t:"Be transparent",d:"Document methodology, sources, and refresh cadence so findings hold up to Finance, Legal, and IT scrutiny."},{t:"Govern the stack",d:"Unify skills data across ATS/HRIS/LMS with role-based access and audit trails; SOC 2 / GDPR / ISO 27001 expect them."},{t:"Build data literacy",d:"Upskill HR partners so intelligence is interpreted well, not over-read or weaponized."}],el=[{t:"Human-in-the-loop",d:"AI drafts and detects patterns; humans review and decide. Pairing the two reduces demographic bias versus either alone."},{t:"Audit everything",d:"Full audit trails and lineage are non-negotiable as boards and regulators scrutinize AI in workforce decisions."},{t:"Faster, tighter plans",d:"Scenario modelling compresses from weeks to days; plan accuracy moves toward ±10% from a ±30% baseline."},{t:"Start on low-stakes calls",d:"Test governance on non-critical decisions first; set clear thresholds for where automation stops and human review begins."}],eo=["Requisitions impacted","Candidates generated","Placements influenced","Historical reqs closed","Reduced empty-seat time"],ei=["Average NPS / CSAT / CES","Cost avoidance vs. research firms","Repeat business from senior stakeholders","Customer expansion (new groups)","Levelling (projects at target seniority)","Headcount investment informed","Project over-run vs. estimate"],es=[{metric:"Stakeholder NPS",what:"Would they recommend TI to a peer?",target:"Trend up; act on detractors fast"},{metric:"Time-to-fill delta",what:"Days shaved on TI-touched roles",target:"Tie to vacancy cost avoided"},{metric:"Cost avoidance",what:"Vs. agency fees and external research",target:"Report in currency, not effort"},{metric:"Plan-to-actual variance",what:"SWP forecast accuracy",target:"Move toward ±10%"},{metric:"Repeat & expansion",what:"Senior repeat asks; new customer groups",target:"Leading signal of trust"},{metric:"On-time delivery",what:"Delivered vs. estimated date",target:"Builds capacity-planning trust"}],ec=[{pillar:"Cost reduction",color:"#16A89B",items:["Vacancy cost avoided via faster fills","Reduced agency dependence","Lower external-research spend","Cost-arbitrage on location"]},{pillar:"Risk reduction",color:"#0C7C72",items:["Better location & site decisions","Key-person and attrition early warning","M&A talent due diligence","Defensible, audit-trailed decisions"]},{pillar:"Revenue / value uplift",color:"#BE6E27",items:["Critical roles filled sooner","Higher quality of hire & retention","Faster planning cycles","Skills ready ahead of demand"]}],eu=[{step:"Earn the first yes",desc:"Take an ad-hoc, high-urgency request and over-deliver. Small value-add projects build the trust that unlocks strategic work."},{step:"Prove repeatable value",desc:"Deliver consistently, on time, with clear impact. Repeat business from a senior sponsor is the strongest signal you're working."},{step:"Get embedded",desc:"Move from order-taker to partner — in the planning conversation, not just the delivery one. Aim for a 1:1 or 1:2 adviser relationship with key leaders."},{step:"Get in the room early",desc:"The endpoint: leaders pull TI in before the decision, not after. You shape the question, not just answer it."}],ed=[{ch:"Targeted newsletter",use:"Push curated intelligence to a defined audience on a cadence — the highest-leverage habit most teams skip."},{ch:"Quarterly business review",use:"Structured forum to show pipeline, impact, and KPIs to sponsors and align on the next quarter."},{ch:"Knowledge base",
